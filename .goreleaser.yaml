# GoReleaser config for gateshell-agent.
#
# TODO: this targets goreleaser's v2 schema; run `goreleaser check` once
# release infra (GitHub Actions workflow, signing keys, download host) is
# actually wired up. Until then this is a scaffold documenting the intended
# cross-compile matrix and build flags, not a verified release pipeline.
version: 2

project_name: gateshell-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: gateshell-agent
    main: ./cmd/gateshell-agent
    binary: gateshell-agent
    # Always build with the sqlite (durable) store -- the default,
    # untagged build is a dev/CI-only convenience, never a release
    # artifact. See internal/store's package doc.
    flags:
      - -tags=sqlite
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0 # modernc.org/sqlite is pure Go; no cgo toolchain needed
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # macOS is a dev convenience for local testing; the agent's primary
    # deployment target is Linux servers. All four combinations below are
    # still built so `gateshell-agent-darwin-arm64` etc. exist for
    # developers on Apple Silicon / Intel Macs.

archives:
  - id: gateshell-agent
    # Raw single binaries so install.sh can curl one file from GitHub Releases.
    formats: [binary]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  # install.sh falls back to fetching the systemd unit from the same
  # release channel as the binary (for curl|sh one-liner installs where
  # deploy/ isn't present locally) -- publish it alongside the binaries so
  # that fetch actually resolves instead of 404ing.
  extra_files:
    - glob: deploy/gateshell-agent.service

# TODO: wire up a separate publish step to also push raw (non-archived)
# binaries to https://gateshell.com/dl/ under the `gateshell-agent-<os>-<arch>`
# naming convention install.sh expects -- goreleaser's default GitHub release
# upload (above) publishes to GitHub Releases, which install.sh already reads
# from directly, so this TODO is about mirroring to the website too, not a
# blocker for install.sh working today.
