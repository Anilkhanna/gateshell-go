name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to cut a release.
# GoReleaser cross-compiles the sqlite build and uploads raw binaries named
# gateshell-agent-<os>-<arch>, which install.sh downloads from the release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
