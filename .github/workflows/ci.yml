name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: build (default)
        run: go build ./...
      - name: vet (default)
        run: go vet ./...
      - name: build (sqlite)
        run: go build -tags sqlite ./...
      - name: vet (sqlite)
        run: go vet -tags sqlite ./...
      - name: test
        run: go test -tags sqlite ./...
